<script>
async function send() {
    let value = document.getElementById("text").value;
    let resultBox = document.getElementById("result");

    if (!value) {
        resultBox.innerText = "Nhập gì đó đi.";
        return;
    }

    resultBox.innerText = "Đang phân tích...";

    try {
        let res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({data: value})
        });

        let data = await res.json();

        if (data.prediction === "positive") {
            resultBox.innerText = ">>> POSITIVE // Tín hiệu tích cực được phát hiện.";
        } else if (data.prediction === "negative") {
            resultBox.innerText = ">>> NEGATIVE // Cảnh báo: năng lượng tiêu cực.";
        } else {
            resultBox.innerText = ">>> UNKNOWN // Không xác định.";
        }

    } catch (error) {
        resultBox.innerText = ">>> ERROR // Hệ thống gặp sự cố.";
    }
}
</script>
