<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Prediction</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial;
}

.container {
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>AI Prediction</h1>

    <input id="text" placeholder="Nhập text">
    <button onclick="send()">Predict</button>

    <p id="result"></p>
</div>

<script>
async function send() {
    let value = document.getElementById("text").value;
    let result = document.getElementById("result");

    if (!value) {
        result.innerText = "Nhập gì đó đi";
        return;
    }

    try {
        let res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({data: value})
        });

        let data = await res.json();

        if (data.prediction === "positive") {
            result.innerText = "POSITIVE";
        } else {
            result.innerText = "NEGATIVE";
        }

    } catch (e) {
        result.innerText = "ERROR";
    }
}
</script>

</body>
</html>
